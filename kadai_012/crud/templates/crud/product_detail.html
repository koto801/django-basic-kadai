<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>商品詳細</title>
</head>
<body>
    <h1>商品詳細</h1>

    <table border="1">
        <tr>
            <th>商品名</th>
            <td>{{ product.name }}</td>
        </tr>
        <tr>
            <th>価格</th>
            <td>{{ product.price }}円</td>
        </tr>
        <tr>
            <th>カテゴリ</th>
            <td>{{ product.category }}</td>
        </tr>
        <tr>
            <th>商品画像</th>
            <td>
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}" width="200">
                {% else %}
                    画像なし
                {% endif %}
            </td>
        </tr>
        <tr>
            <th>商品の詳細説明</th>
            <td>{{ product.description }}</td>
        </tr>
    </table>

    <a href="{% url 'product_list' %}">一覧に戻る</a>
</body>
