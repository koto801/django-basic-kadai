<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>商品詳細</title>
</head>
<body>
    <h1>商品詳細</h1>
    <table border="1">
        <tbody>
            <tr>
                <th>ID</th>
                <td>{{ object.id }}</td>
            </tr>
            <tr>
                <th>商品名</th>
                <td>{{ object.name }}</td>
            </tr>
            <tr>
                <th>価格</th>
                <td>{{ object.price }}</td>
            </tr>
        </tbody>
    </table>
    <a href="{% url 'product_list' %}">一覧に戻る</a>
</body>
</html>
